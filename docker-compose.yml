services:
  postgres:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-release_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-release_tracker}
      POSTGRES_DB: ${POSTGRES_DB:-release_tracker_db}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql

  app:
    build: .
    depends_on:
      - postgres
    environment:
      SECURITY_ENABLED: ${SECURITY_ENABLED:-true}
      SECURITY_USER_USERNAME: ${SECURITY_USER_USERNAME:-user}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-user123}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-release-tracker-super-super-secret}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-release_tracker_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-release_tracker}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-release_tracker}
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"